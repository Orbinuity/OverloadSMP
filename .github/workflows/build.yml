name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    # 1. Give GitHub Actions permission to create releases
    permissions:
      contents: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: build/libs/

      # -----------------------------------------------------------------
      # AUTOMATIC RELEASE STEPS
      # -----------------------------------------------------------------

      # 2. Extract the project version from Gradle
      - name: Extract project version
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: get_version
        run: |
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 3. Check if the release already exists
      - name: Check if release exists
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
            echo "::warning::Release v${{ env.VERSION }} already exists! You probably forgot to update the version in your build.gradle."
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      # 4. Create the Release if it doesn't exist
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps:check_release.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: README.md
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}